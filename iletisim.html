<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Web Projesi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Vue.js Kütüphanesi (Proje Şartı İçin) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Üst Menü -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Web Projesi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobilMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mobilMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Takımımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="api.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-warning btn-sm ms-2 text-dark fw-bold" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Vue.js Uygulama Kapsayıcısı -->
    <main id="app" class="container py-5 mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 bg-white">
                    <h2 class="fw-bold custom-text-primary text-center mb-4 border-bottom pb-3">İletişim Formu</h2>
                    
                    <!-- Hata Mesajları Kutusu -->
                    <div v-if="vueHatalar.length > 0" class="alert alert-danger shadow-sm">
                        <strong class="d-block mb-2"><i class="fas fa-exclamation-triangle me-2"></i>Vue.js Denetim Hataları:</strong>
                        <ul class="mb-0">
                            <li v-for="hata in vueHatalar">{{ hata }}</li>
                        </ul>
                    </div>
                    
                    <div id="native-alert" class="alert alert-danger d-none shadow-sm"></div>

                    <!-- PHP'ye veri gönderecek form -->
                    <form id="contactForm" action="sonuc.php" method="POST" novalidate ref="formElement">
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="ad" class="form-label fw-bold">Adınız</label>
                                <input type="text" class="form-control" id="ad" name="ad" v-model="form.ad" placeholder="Örn: Ali">
                            </div>
                            <div class="col-md-6">
                                <label for="soyad" class="form-label fw-bold">Soyadınız</label>
                                <input type="text" class="form-control" id="soyad" name="soyad" v-model="form.soyad" placeholder="Örn: Yılmaz">
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold">E-Posta Adresiniz</label>
                                <input type="email" class="form-control" id="email" name="email" v-model="form.email" placeholder="mail@ornek.com">
                            </div>
                            <div class="col-md-6">
                                <label for="telefon" class="form-label fw-bold">Telefon Numaranız</label>
                                <input type="text" class="form-control" id="telefon" name="telefon" v-model="form.telefon" placeholder="Sadece rakam giriniz">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Cinsiyetiniz (Radio)</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="konu" class="form-label fw-bold">Konu (Select)</label>
                            <select class="form-select" id="konu" name="konu" v-model="form.konu">
                                <option value="">Lütfen seçiniz...</option>
                                <option value="İş Birliği">İş Birliği</option>
                                <option value="Soru / Öneri">Soru / Öneri</option>
                                <option value="Diğer">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="mesaj" class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="4" v-model="form.mesaj" placeholder="Mesajınızı buraya yazın..."></textarea>
                        </div>

                        <div class="form-check mb-4 border-top pt-3">
                            <input class="form-check-input" type="checkbox" id="onay" name="onay" v-model="form.onay">
                            <label class="form-check-label text-muted" for="onay">
                                Verilerimin işlenmesini kabul ediyorum. (Checkbox)
                            </label>
                        </div>

                        <!-- İki Farklı Doğrulama Butonu (Proje Şartı) -->
                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <button type="button" id="btnNativeJS" class="btn btn-dark fw-bold px-4 shadow-sm">
                                <i class="fas fa-code me-2"></i>Gönder (Native JS)
                            </button>
                            <button type="button" @click="kontrolEtVue" class="btn btn-success fw-bold px-4 shadow-sm">
                                <i class="fab fa-vuejs me-2"></i>Gönder (Vue.js)
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="iletisim.js"></script>
</body>
</html>
