<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Web Projesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light" style="font-family: 'Poppins', sans-serif;">

    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px;">
        <div class="card-header bg-dark text-white text-center py-4 rounded-top-4">
            <h3 class="mb-0 fw-bold">Öğrenci Girişi</h3>
        </div>
        <div class="card-body p-4 p-md-5">
            
            <!-- Hata kutusu -->
            <div id="loginError" class="alert alert-danger d-none small"></div>

            <form id="loginForm" action="login.php" method="POST" novalidate>
                <div class="mb-4">
                    <label for="email" class="form-label fw-bold">Öğrenci E-Posta</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="b2612100001@sakarya.edu.tr">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Şifre</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Öğrenci Numaranız (Örn: b2612100001)">
                </div>
                <button type="button" id="btnLogin" class="btn btn-warning w-100 py-3 fw-bold text-dark fs-5 shadow-sm rounded-3">
                    Giriş Yap
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="index.html" class="text-muted text-decoration-none small">Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btnLogin').addEventListener('click', function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('loginError');
            
            // Sakarya Üniversitesi Öğrenci Mail Formatı Kontrolü (b ile başlar, rakamlar gelir, @sakarya.edu.tr ile biter)
            const sakaryaRegex = /^b[0-9]+@sakarya\.edu\.tr$/i;

            if (email === '' || password === '') {
                errorBox.textContent = 'E-posta ve şifre alanları boş bırakılamaz.';
                errorBox.classList.remove('d-none');
            } else if (!sakaryaRegex.test(email)) {
                errorBox.textContent = 'Lütfen geçerli bir öğrenci maili giriniz (Örn: b123456789@sakarya.edu.tr)';
                errorBox.classList.remove('d-none');
            } else {
                errorBox.classList.add('d-none');
                document.getElementById('loginForm').submit(); // Hatasızsa PHP'ye gönder
            }
        });
    </script>
</body>
</html>
