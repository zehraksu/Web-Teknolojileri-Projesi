<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <!-- Üst Menü -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Web Projesi</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Takımımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="api.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary btn-sm ms-2 active" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Ana İçerik: Login Formu -->
    <main class="container mt-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white text-center py-3">
                    <h3 class="mb-0">Öğrenci Girişi</h3>
                </div>
                <div class="card-body p-4">
                    
                    <div id="hataKutusu" class="alert alert-danger d-none" role="alert"></div>

                    <form id="loginFormu" action="login_kontrol.php" method="POST" onsubmit="return loginDogrula(event)">
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Öğrenci E-Posta</label>
                            <!-- Yönlendirme metni senin e-postan olarak güncellendi -->
                            <input type="text" class="form-control" id="email" name="email" placeholder="zehra.aksu@ogr.sakarya.edu.tr">
                        </div>

                        <div class="mb-4">
                            <label for="sifre" class="form-label fw-bold">Şifre</label>
                            <input type="password" class="form-control" id="sifre" name="sifre" placeholder="Öğrenci Numaranız">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Giriş Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; <span id="guncelYil"></span> Betül Zehra Aksu - Tüm hakları saklıdır.</p>
    </footer>

    <!-- JS Kodları -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("guncelYil").textContent = new Date().getFullYear();

        const hataKutusu = document.getElementById('hataKutusu');

        // URL'den gelen PHP hatalarını yakalama
        const urlParams = new URLSearchParams(window.location.search);
        const hataDurumu = urlParams.get('hata');
        
        if (hataDurumu === 'yanlis') {
            hatayiGoster('E-posta veya şifre hatalı! Lütfen tekrar deneyin.');
        } else if (hataDurumu === 'bos') {
            hatayiGoster('Sunucuya boş veri gönderilemez!');
        }

        // Form gönderilmeden önce çalışacak JavaScript Denetimi
        function loginDogrula(event) {
            hataKutusu.classList.add('d-none'); 

            const email = document.getElementById('email').value.trim();
            const sifre = document.getElementById('sifre').value.trim();

            if (email === '' || sifre === '') {
                event.preventDefault(); 
                hatayiGoster('Lütfen e-posta ve şifre alanlarını boş bırakmayınız!');
                return false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                event.preventDefault();
                hatayiGoster('Lütfen geçerli bir e-posta adresi giriniz!');
                return false;
            }

            return true; 
        }

        function hatayiGoster(mesaj) {
            hataKutusu.classList.remove('d-none');
            hataKutusu.textContent = mesaj;
        }
    </script>
</body>
</html>
